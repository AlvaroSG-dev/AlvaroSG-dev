<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>AlvaroSG — Web Developer</title>
  <desc>Banner animado de presentación para GitHub</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c2cb;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00c2cb"/>
      <stop offset="70%" style="stop-color:#7f77dd"/>
      <stop offset="100%" style="stop-color:#7f77dd;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c2cb"/>
      <stop offset="100%" style="stop-color:#afa9ec"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00c2cb;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00c2cb;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#00c2cb;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="bannerClip"><rect width="900" height="280" rx="12"/></clipPath>
  </defs>
  <style>
    .bracket{stroke:#00c2cb;stroke-width:1.5;fill:none;opacity:0.7}
    .fade1{animation:fadeIn .8s ease forwards;opacity:0}
    .fade2{animation:fadeIn .8s .3s ease forwards;opacity:0}
    .fade3{animation:fadeIn .8s .6s ease forwards;opacity:0}
    .fade4{animation:fadeIn .8s .9s ease forwards;opacity:0}
    .fade5{animation:fadeIn .8s 1.1s ease forwards;opacity:0}
    .fade6{animation:fadeIn .8s 1.3s ease forwards;opacity:0}
    @keyframes fadeIn{to{opacity:1}}
    .scanline{animation:scan 4s 1.5s ease-in-out infinite}
    @keyframes scan{0%{transform:translateY(-60px);opacity:1}80%{opacity:1}100%{transform:translateY(340px);opacity:0}}
    .accentbar{animation:growLine 1s .9s ease forwards;transform-origin:center;transform:scaleX(0)}
    @keyframes growLine{to{transform:scaleX(1)}}
    .dot-left{animation:pulse 3s 2s ease-in-out infinite}
    .dot-right{animation:pulse 3s 2.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.15;r:7}50%{opacity:.4;r:11}}
    .cursor{animation:blink 1.1s 2s step-end infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .brk{stroke-dasharray:40;stroke-dashoffset:40;animation:drawBrk .5s ease forwards}
    .brk1{animation-delay:.1s}.brk2{animation-delay:.2s}.brk3{animation-delay:.3s}.brk4{animation-delay:.4s}
    @keyframes drawBrk{to{stroke-dashoffset:0}}
    .p1{animation:floatP 6s 1s ease-in-out infinite alternate}
    .p2{animation:floatP 8s 2s ease-in-out infinite alternate}
    .p3{animation:floatP 7s .5s ease-in-out infinite alternate}
    @keyframes floatP{from{transform:translateY(0)translateX(0)}to{transform:translateY(-12px)translateX(6px)}}
  </style>
  <rect width="900" height="280" rx="12" fill="url(#bgGrad)"/>
  <g clip-path="url(#bannerClip)" opacity="0.04" stroke="#00c2cb" stroke-width="0.5">
    <line x1="0" y1="56" x2="900" y2="56"/><line x1="0" y1="112" x2="900" y2="112"/>
    <line x1="0" y1="168" x2="900" y2="168"/><line x1="0" y1="224" x2="900" y2="224"/>
    <line x1="180" y1="0" x2="180" y2="280"/><line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="540" y1="0" x2="540" y2="280"/><line x1="720" y1="0" x2="720" y2="280"/>
  </g>
  <g clip-path="url(#bannerClip)">
    <rect class="scanline" x="0" y="0" width="900" height="60" fill="url(#scanGrad)"/>
  </g>
  <polyline class="bracket brk brk1" points="36,48 36,32 52,32"/>
  <polyline class="bracket brk brk2" points="848,32 864,32 864,48"/>
  <polyline class="bracket brk brk3" points="36,232 36,248 52,248"/>
  <polyline class="bracket brk brk4" points="848,248 864,248 864,232"/>
  <g opacity="0.25">
    <circle class="p1" cx="130" cy="80" r="2" fill="#00c2cb"/>
    <circle class="p2" cx="770" cy="90" r="1.5" fill="#afa9ec"/>
    <circle class="p3" cx="200" cy="200" r="1.5" fill="#00c2cb"/>
    <circle class="p1" cx="820" cy="190" r="2" fill="#7f77dd"/>
    <circle class="p2" cx="90" cy="160" r="1" fill="#afa9ec"/>
    <circle class="p3" cx="750" cy="210" r="1" fill="#00c2cb"/>
  </g>
  <circle class="dot-left" cx="60" cy="140" r="7" fill="#00c2cb"/>
  <circle cx="60" cy="140" r="3" fill="#00c2cb" opacity="0.9"/>
  <circle class="dot-right" cx="840" cy="140" r="7" fill="#afa9ec"/>
  <circle cx="840" cy="140" r="3" fill="#afa9ec" opacity="0.9"/>
  <g class="fade1">
    <rect x="370" y="56" width="160" height="24" rx="4" fill="#00c2cb" opacity="0.12"/>
    <rect x="370" y="56" width="160" height="24" rx="4" fill="none" stroke="#00c2cb" stroke-width="0.8" opacity="0.5"/>
    <text x="450" y="72.5" text-anchor="middle" fill="#00c2cb" font-family="monospace" font-size="12" font-weight="500">@AlvaroSG-Dev</text>
  </g>
  <g class="fade2">
    <text x="450" y="148" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="68" font-weight="700" fill="url(#textGrad)" letter-spacing="-1">AlvaroSG</text>
    <text class="cursor" x="734" y="148" font-family="monospace" font-size="60" font-weight="300" fill="#00c2cb">_</text>
  </g>
  <rect class="accentbar" x="200" y="160" width="500" height="2" rx="1" fill="url(#accentLine)"/>
  <text class="fade3" x="450" y="196" text-anchor="middle" fill="#8b949e" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" letter-spacing="2">WEB DEVELOPER  ·  FULL STACK  ·  EN FORMACIÓN</text>
  <g class="fade4" font-family="monospace" font-size="11" font-weight="500">
    <rect x="230" y="216" width="60" height="20" rx="3" fill="#3776AB" opacity="0.25"/><rect x="230" y="216" width="60" height="20" rx="3" fill="none" stroke="#3776AB" stroke-width="0.8" opacity="0.7"/><text x="260" y="230" text-anchor="middle" fill="#85b7eb">Python</text>
    <rect x="300" y="216" width="56" height="20" rx="3" fill="#E34F26" opacity="0.2"/><rect x="300" y="216" width="56" height="20" rx="3" fill="none" stroke="#E34F26" stroke-width="0.8" opacity="0.7"/><text x="328" y="230" text-anchor="middle" fill="#f09595">HTML5</text>
    <rect x="366" y="216" width="48" height="20" rx="3" fill="#1572B6" opacity="0.2"/><rect x="366" y="216" width="48" height="20" rx="3" fill="none" stroke="#1572B6" stroke-width="0.8" opacity="0.7"/><text x="390" y="230" text-anchor="middle" fill="#85b7eb">CSS3</text>
    <rect x="424" y="216" width="70" height="20" rx="3" fill="#F7DF1E" opacity="0.15"/><rect x="424" y="216" width="70" height="20" rx="3" fill="none" stroke="#F7DF1E" stroke-width="0.8" opacity="0.6"/><text x="459" y="230" text-anchor="middle" fill="#fac775">JavaScript</text>
    <rect x="504" y="216" width="74" height="20" rx="3" fill="#7952B3" opacity="0.25"/><rect x="504" y="216" width="74" height="20" rx="3" fill="none" stroke="#7952B3" stroke-width="0.8" opacity="0.7"/><text x="541" y="230" text-anchor="middle" fill="#afa9ec">Bootstrap</text>
    <rect x="588" y="216" width="44" height="20" rx="3" fill="#F05032" opacity="0.2"/><rect x="588" y="216" width="44" height="20" rx="3" fill="none" stroke="#F05032" stroke-width="0.8" opacity="0.7"/><text x="610" y="230" text-anchor="middle" fill="#f09595">Git</text>
  </g>
  <g class="fade5" fill="#00c2cb" opacity="0.35">
    <circle cx="100" cy="252" r="1.5"/><circle cx="112" cy="252" r="1.5"/><circle cx="124" cy="252" r="1.5"/>
  </g>
  <g class="fade6" fill="#7f77dd" opacity="0.35">
    <circle cx="776" cy="252" r="1.5"/><circle cx="788" cy="252" r="1.5"/><circle cx="800" cy="252" r="1.5"/>
  </g>
</svg>
